<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
padding:0;
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
}

#reader{
width:100%;
max-width:600px;
margin:auto;
}

.controls{
padding:20px;
}

button{
font-size:22px;
padding:15px;
margin:10px;
width:170px;
border:none;
border-radius:14px;
font-weight:bold;
}

.outBtn{
background:#ff9800;
color:white;
}

.inBtn{
background:#4caf50;
color:white;
}

#status{
font-size:24px;
padding:15px;
min-height:60px;
font-weight:bold;
}

.modeText{
font-size:18px;
opacity:0.8;
margin-top:10px;
}

</style>

</head>

<body>

<div id="reader"></div>

<div class="controls">

<div class="modeText" id="modeText">
Режим: Выдача
</div>

<button class="outBtn" onclick="setMode('OUT')">
Выдача
</button>

<button class="inBtn" onclick="setMode('IN')">
Прием
</button>

<div id="status">
Готов к сканированию
</div>

</div>

<script>

let mode = "OUT";

let lastScanTimes = {};

function setMode(newMode){

mode = newMode;

document.getElementById("modeText").innerText =
mode === "OUT"
? "Режим: Выдача"
: "Режим: Прием";

}

async function onScanSuccess(decodedText){

const now = Date.now();

if(
lastScanTimes[decodedText] &&
now - lastScanTimes[decodedText] < 10000
){
return;
}

lastScanTimes[decodedText] = now;

navigator.vibrate?.(100);

document.getElementById("status").innerText =
"Проверка: " + decodedText;

try{

const response = await fetch(
"https://script.google.com/macros/s/AKfycbxS6NirNlFbeitnfQOSaO1h9_SN3ZgSrjMcRx1p3oyn0Un9xr5_THMZ3E9sYAzR2qg/exec",
{
method: "POST",
body: JSON.stringify({
mode: mode,
code: decodedText
})
}
);

const result = await response.text();

document.getElementById("status").innerText = result;

}catch(e){

document.getElementById("status").innerText =
"Ошибка соединения";

}

setTimeout(() => {

document.getElementById("status").innerText =
"Готов к сканированию";

}, 2000);

}

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
{ facingMode: "environment" },
{
fps: 10,
qrbox: 280,
aspectRatio: 1
},
onScanSuccess
);

</script>

</body>
</html>
