<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Warehouse Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
padding:0;
background:#0f0f0f;
color:white;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
overflow:hidden;
}

.header{
padding-top:20px;
padding-bottom:10px;
font-size:26px;
font-weight:700;
}

#reader{
width:92vw;
max-width:360px;
height:220px;
overflow:hidden;
border-radius:24px;
border:3px solid #2a2a2a;
background:black;
}

.controls{
width:100%;
max-width:420px;
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
}

.modeText{
font-size:18px;
opacity:0.75;
margin-bottom:15px;
}

.buttons{
display:flex;
gap:12px;
width:100%;
justify-content:center;
}

button{
flex:1;
max-width:180px;
height:62px;
border:none;
border-radius:18px;
font-size:22px;
font-weight:700;
color:white;
}

.outBtn{
background:#ff9800;
}

.inBtn{
background:#4caf50;
}

#status{
margin-top:20px;
font-size:22px;
font-weight:700;
min-height:32px;
text-align:center;
padding:10px;
}

.success{
color:#4caf50;
}

.error{
color:#ff5252;
}

.ready{
color:#bdbdbd;
}

.scanLine{
position:absolute;
width:100%;
height:2px;
background:red;
animation:scan 2s linear infinite;
}

@keyframes scan{
0%{
transform:translateY(0);
}
100%{
transform:translateY(220px);
}
}

</style>

</head>

<body>

<div class="header">
Warehouse Scanner
</div>

<div id="reader"></div>

<div class="controls">

<div class="modeText" id="modeText">
Режим: Выдача
</div>

<div class="buttons">

<button
class="outBtn"
onclick="setMode('OUT')">
Выдача
</button>

<button
class="inBtn"
onclick="setMode('IN')">
Прием
</button>

</div>

<div id="status" class="ready">
Готов к сканированию
</div>

</div>

<script>

let mode = "OUT";

let isCooldown = false;

let lastCode = "";

let lastTime = 0;

const statusEl = document.getElementById("status");

function setMode(newMode){

mode = newMode;

document.getElementById("modeText").innerText =
mode === "OUT"
? "Режим: Выдача"
: "Режим: Прием";

navigator.vibrate?.(50);

}

function setStatus(text,type="ready"){

statusEl.className = type;

statusEl.innerText = text;

}

async function onScanSuccess(decodedText){

const now = Date.now();

if(
decodedText === lastCode &&
now - lastTime < 2000
){
return;
}

if(isCooldown){
return;
}

isCooldown = true;

lastCode = decodedText;
lastTime = now;

navigator.vibrate?.(120);

setStatus(
(mode === "OUT"
? "Выдача: "
: "Прием: ")
+ decodedText,
"success"
);

try{

const response = await fetch(
"https://script.google.com/macros/s/AKfycbxS6NirNlFbeitnfQOSaO1h9_SN3ZgSrjMcRx1p3oyn0Un9xr5_THMZ3E9sYAzR2qg/exec",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
mode:mode,
code:decodedText
})
}
);

if(!response.ok){
throw new Error();
}

}catch(e){

setStatus(
"Ошибка соединения",
"error"
);

setTimeout(()=>{
setStatus(
"Готов к сканированию",
"ready"
);
},1500);

isCooldown = false;

return;

}

setTimeout(()=>{

setStatus(
"Готов к сканированию",
"ready"
);

isCooldown = false;

},800);

}

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
{
facingMode:"environment"
},
{
fps:20,

qrbox:{
width:300,
height:120
},

aspectRatio:1.777778,

disableFlip:false,

formatsToSupport:[
Html5QrcodeSupportedFormats.CODE_128
],

experimentalFeatures:{
useBarCodeDetectorIfSupported:true
}
},
onScanSuccess
);

</script>

</body>

</html>
